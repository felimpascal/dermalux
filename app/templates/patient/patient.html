{% extends "base/base.html" %}
{% block content %}

<style>
  .page-head {
    gap: .75rem;
  }

  .filter-box,
  .table-box {
    border: 1px solid rgba(0,0,0,.08);
    border-radius: 1rem;
    overflow: hidden;
  }

  .desktop-list {
    display: block;
  }

  .mobile-list {
    display: none;
  }

  .patient-card-list {
    display: grid;
    gap: .85rem;
  }

  .patient-card {
    border: 1px solid rgba(0,0,0,.08);
    border-radius: 1rem;
    background: #fff;
    box-shadow: 0 2px 10px rgba(0,0,0,.04);
    overflow: hidden;
  }

  .patient-card-head {
    padding: .9rem 1rem .75rem;
    border-bottom: 1px solid rgba(0,0,0,.06);
    background: #fafafa;
  }

  .patient-card-title {
    font-weight: 600;
    font-size: 1rem;
    line-height: 1.3;
    margin-bottom: .15rem;
  }

  .patient-card-subtitle {
    font-size: .84rem;
    color: #6c757d;
  }

  .patient-card-body {
    padding: .95rem 1rem 1rem;
  }

  .patient-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .8rem .9rem;
  }

  .patient-field.full {
    grid-column: 1 / -1;
  }

  .patient-label {
    font-size: .76rem;
    color: #6c757d;
    margin-bottom: .12rem;
  }

  .patient-value {
    font-weight: 500;
    word-break: break-word;
  }

  .patient-actions {
    margin-top: .85rem;
    display: flex;
    gap: .6rem;
  }

  .patient-actions .btn {
    width: 100%;
  }

  .table-responsive {
    padding: 1%;
  }

  .addr-truncate {
    max-width: 420px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @media (max-width: 991.98px) {
    #tblPatients th,
    #tblPatients td {
      padding: .55rem .5rem;
      font-size: .9rem;
    }

    .addr-truncate {
      max-width: 240px;
    }
  }

  @media (max-width: 767.98px) {
    .page-head {
      flex-direction: column;
      align-items: stretch !important;
    }

    .page-head .btn {
      width: 100%;
    }

    .page-title {
      font-size: 1.15rem;
    }

    .filter-box {
      padding: .95rem !important;
    }

    .filter-box .form-control,
    .filter-box .btn,
    .modal .form-control,
    .modal .form-select,
    .modal .btn {
      min-height: 44px;
      font-size: .95rem;
    }

    .desktop-list {
      display: none;
    }

    .mobile-list {
      display: block;
    }

    .patient-grid {
      grid-template-columns: 1fr 1fr;
    }

    .modal-dialog {
      margin: .6rem;
    }

    .modal-content {
      border-radius: 1rem;
    }

    .modal-header,
    .modal-footer {
      padding: .9rem 1rem;
    }

    .modal-body {
      padding: 1rem;
    }
  }

  @media (max-width: 420px) {
    .patient-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="d-flex justify-content-between align-items-center mb-3 page-head">
  <h4 class="mb-0 page-title">Master Pasien</h4>
  <button id="btnAdd" class="btn btn-success" type="button">
    + Tambah Pasien
  </button>
</div>

<form class="row g-2 mb-3 filter-box p-3" onsubmit="return false;">
  <div class="col-12 col-md-9">
    <input id="q" type="text" class="form-control" placeholder="Cari: nama / no hp / kode pasien / nik">
  </div>
  <div class="col-12 col-md-3 d-grid">
    <button id="btnLoad" class="btn btn-outline-secondary" type="button">
      Filter
    </button>
  </div>
</form>

<!-- DESKTOP / TABLET -->
<div class="desktop-list">
  <div class="card table-box">
    <div class="table-responsive">
      <table class="table table-sm table-striped table-hover align-middle mb-0" id="tblPatients">
        <thead class="table-light">
          <tr>
            <th style="width:90px;">Kode</th>
            <th style="width:170px;">NIK</th>
            <th>Nama</th>
            <th style="width:130px;">Gender</th>
            <th style="width:140px;">Tanggal Lahir</th>
            <th style="width:170px;">No HP</th>
            <th>Alamat</th>
            <th style="width:140px;" class="text-end">Aksi</th>
          </tr>
        </thead>
        <tbody id="tbodyPatients">
          <tr>
            <td colspan="8" class="text-center text-muted">Memuat data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MOBILE -->
<div class="mobile-list">
  <div id="mobilePatientsWrap" class="patient-card-list">
    <div class="card table-box">
      <div class="card-body text-center text-muted py-4">
        Memuat data...
      </div>
    </div>
  </div>
</div>

<!-- Modal Add/Edit -->
<div class="modal fade" id="patientModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-fullscreen-sm-down modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Pasien</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div id="modalAlert" class="alert alert-danger d-none"></div>

        <form id="patientForm" autocomplete="off">
          <input type="hidden" id="patient_id">

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">NIK (opsional)</label>
              <input id="nik" class="form-control" maxlength="16" inputmode="numeric" placeholder="16 digit angka">
              <div class="form-text">Opsional. Jika diisi wajib 16 digit angka.</div>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">No HP <span class="text-danger">*</span></label>
              <input id="phone" class="form-control" maxlength="30" placeholder="08xxxxxxxxxx" required>
              <div class="form-text">Gunakan angka, minimal 8 digit.</div>
            </div>

            <div class="col-12">
              <label class="form-label">Nama <span class="text-danger">*</span></label>
              <input id="full_name" class="form-control" maxlength="150" placeholder="Nama lengkap" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Tempat lahir <span class="text-danger">*</span></label>
              <input id="birth_place" class="form-control" maxlength="100" placeholder="Kota" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Tanggal lahir <span class="text-danger">*</span></label>
              <input id="birth_date" type="date" class="form-control" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Jenis kelamin <span class="text-danger">*</span></label>
              <select id="gender" class="form-select" required>
                <option value="">-- pilih --</option>
                <option value="M">Laki-laki</option>
                <option value="F">Perempuan</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">Alamat <span class="text-danger">*</span></label>
              <textarea id="address" class="form-control" rows="3" maxlength="255" required></textarea>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-primary" id="btnSave">Simpan</button>
      </div>

    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  const tbody = document.getElementById("tbodyPatients");
  const qEl = document.getElementById("q");
  const mobileWrap = document.getElementById("mobilePatientsWrap");

  const modalEl = document.getElementById("patientModal");
  const modal = new bootstrap.Modal(modalEl);

  const modalTitle = document.getElementById("modalTitle");
  const modalAlert = document.getElementById("modalAlert");

  let dt = null;

  function isMobileView() {
    return window.innerWidth < 768;
  }

  function destroyDataTableIfExists() {
    if (dt) {
      dt.destroy();
      dt = null;
    }
  }

  function initOrRefreshDataTable() {
    if (isMobileView()) {
      destroyDataTableIfExists();
      return;
    }

    const table = document.getElementById("tblPatients");
    destroyDataTableIfExists();

    const firstRow = tbody.querySelector("tr");
    if (!firstRow) return;

    const tdCount = firstRow.querySelectorAll("td").length;
    const hasColspanCell = firstRow.querySelector("td[colspan]");

    if (hasColspanCell || tdCount !== 8) {
      return;
    }

    dt = new DataTable(table, {
      pageLength: 10,
      lengthMenu: [10, 25, 50, 100],
      order: [[0, "asc"]],
      columnDefs: [
        { orderable: false, targets: [7] }
      ],
      language: {
        search: "Cari (tabel):",
        lengthMenu: "Tampilkan _MENU_ baris",
        info: "Menampilkan _START_–_END_ dari _TOTAL_ data",
        infoEmpty: "Tidak ada data",
        zeroRecords: "Tidak ada data yang cocok",
        emptyTable: "Tidak ada data",
        paginate: {
          first: "Awal",
          last: "Akhir",
          next: "Berikutnya",
          previous: "Sebelumnya"
        }
      }
    });
  }

  document.getElementById("nik").addEventListener("input", (e) => {
    e.target.value = (e.target.value || "").replace(/\D/g, "").slice(0, 16);
  });

  function toISODate(val) {
    if (!val) return "";
    const s = String(val).trim();

    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);

    const dtObj = new Date(s);
    if (isNaN(dtObj.getTime())) return "";

    const y = dtObj.getFullYear();
    const m = String(dtObj.getMonth() + 1).padStart(2, "0");
    const d = String(dtObj.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function getCsrfToken() {
    const meta = document.querySelector('meta[name="csrf-token"]');
    return meta ? (meta.getAttribute("content") || "") : "";
  }

  function showModalError(msg) {
    modalAlert.textContent = msg;
    modalAlert.classList.remove("d-none");
  }

  function clearModalError() {
    modalAlert.textContent = "";
    modalAlert.classList.add("d-none");
  }

  function fmtGender(g) {
    if (g === "M") return "Laki-laki";
    if (g === "F") return "Perempuan";
    return "";
  }

  function fmtDate(val) {
    if (!val) return "";
    const s = String(val).trim();

    if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
      const [y, m, d] = s.slice(0, 10).split("-");
      return `${d}/${m}/${y}`;
    }

    const dtObj = new Date(s);
    if (!isNaN(dtObj.getTime())) {
      const dd = String(dtObj.getDate()).padStart(2, "0");
      const mm = String(dtObj.getMonth() + 1).padStart(2, "0");
      const yy = dtObj.getFullYear();
      return `${dd}/${mm}/${yy}`;
    }

    return s;
  }

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function setLoadingRow(text = "Memuat data...") {
    destroyDataTableIfExists();
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="text-center text-muted">${escapeHtml(text)}</td>
      </tr>
    `;
    mobileWrap.innerHTML = `
      <div class="card table-box">
        <div class="card-body text-center text-muted py-4">${escapeHtml(text)}</div>
      </div>
    `;
  }

  function setEmptyRow() {
    destroyDataTableIfExists();
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="text-center text-muted">Tidak ada data pasien.</td>
      </tr>
    `;
    mobileWrap.innerHTML = `
      <div class="card table-box">
        <div class="card-body text-center text-muted py-4">Tidak ada data pasien.</div>
      </div>
    `;
  }

  function setErrorRow(message) {
    destroyDataTableIfExists();
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="text-center text-danger">${escapeHtml(message)}</td>
      </tr>
    `;
    mobileWrap.innerHTML = `
      <div class="card table-box">
        <div class="card-body text-center text-danger py-4">${escapeHtml(message)}</div>
      </div>
    `;
  }

  function renderMobileRows(rows) {
    if (!rows || rows.length === 0) {
      mobileWrap.innerHTML = `
        <div class="card table-box">
          <div class="card-body text-center text-muted py-4">Tidak ada data pasien.</div>
        </div>
      `;
      return;
    }

    mobileWrap.innerHTML = rows.map(r => `
      <div class="patient-card">
        <div class="patient-card-head">
          <div class="patient-card-title">${escapeHtml(r.full_name ?? "")}</div>
          <div class="patient-card-subtitle">
            ${escapeHtml(r.patient_code ?? "")} • ${escapeHtml(r.nik ?? "-")}
          </div>
        </div>

        <div class="patient-card-body">
          <div class="patient-grid">
            <div class="patient-field">
              <div class="patient-label">Gender</div>
              <div class="patient-value">${escapeHtml(fmtGender(r.gender) || "-")}</div>
            </div>

            <div class="patient-field">
              <div class="patient-label">Tanggal Lahir</div>
              <div class="patient-value">${escapeHtml(fmtDate(r.birth_date) || "-")}</div>
            </div>

            <div class="patient-field">
              <div class="patient-label">No HP</div>
              <div class="patient-value">${escapeHtml(r.phone ?? "-")}</div>
            </div>

            <div class="patient-field full">
              <div class="patient-label">Alamat</div>
              <div class="patient-value">${escapeHtml(r.address ?? "-")}</div>
            </div>
          </div>

          <div class="patient-actions">
            <button class="btn btn-outline-primary" type="button" onclick="openEdit(${Number(r.id)})">
              Edit
            </button>
          </div>
        </div>
      </div>
    `).join("");
  }

  function renderDesktopRows(rows) {
    if (!rows || rows.length === 0) {
      setEmptyRow();
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="fw-semibold">${escapeHtml(r.patient_code ?? "")}</td>
        <td>${escapeHtml(r.nik ?? "")}</td>
        <td>${escapeHtml(r.full_name ?? "")}</td>
        <td>${escapeHtml(fmtGender(r.gender))}</td>
        <td data-order="${escapeHtml(toISODate(r.birth_date))}">
          ${escapeHtml(fmtDate(r.birth_date))}
        </td>
        <td>${escapeHtml(r.phone ?? "")}</td>
        <td class="addr-truncate" title="${escapeHtml(r.address ?? "")}">
          ${escapeHtml(r.address ?? "")}
        </td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary" type="button" onclick="openEdit(${Number(r.id)})">Edit</button>
        </td>
      </tr>
    `).join("");
  }

  function renderRows(rows) {
    destroyDataTableIfExists();

    if (!rows || rows.length === 0) {
      setEmptyRow();
      return;
    }

    renderDesktopRows(rows);
    renderMobileRows(rows);
    initOrRefreshDataTable();
  }

  async function apiGet(url) {
    const r = await fetch(url, {
      method: "GET"
    });

    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.ok === false) {
      throw new Error(j.error || j.message || `Request gagal (${r.status})`);
    }
    return j.data;
  }

  async function apiSend(url, method, payload) {
    const headers = {
      "Content-Type": "application/json"
    };

    const csrfToken = getCsrfToken();
    if (csrfToken) {
      headers["X-CSRFToken"] = csrfToken;
    }

    const r = await fetch(url, {
      method,
      headers,
      body: JSON.stringify(payload)
    });

    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.ok === false) {
      throw new Error(j.error || j.message || `Request gagal (${r.status})`);
    }
    return j.data;
  }

  async function loadPatients() {
    try {
      setLoadingRow();

      const q = qEl.value.trim();
      const url = q
        ? `/api/patients?q=${encodeURIComponent(q)}&limit=50`
        : `/api/patients?limit=50`;

      const rows = await apiGet(url);
      renderRows(rows);
    } catch (e) {
      setErrorRow("Error: " + e.message);
    }
  }

  function resetForm() {
    document.getElementById("patient_id").value = "";
    document.getElementById("nik").value = "";
    document.getElementById("full_name").value = "";
    document.getElementById("birth_place").value = "";
    document.getElementById("birth_date").value = "";
    document.getElementById("gender").value = "";
    document.getElementById("address").value = "";
    document.getElementById("phone").value = "";
  }

  function getFormPayload() {
    const nikRaw = (document.getElementById("nik").value || "").trim();
    const nik = nikRaw ? nikRaw.replace(/\D/g, "") : null;

    return {
      nik: nik || null,
      full_name: (document.getElementById("full_name").value || "").trim(),
      birth_place: (document.getElementById("birth_place").value || "").trim(),
      birth_date: (document.getElementById("birth_date").value || "").trim(),
      gender: (document.getElementById("gender").value || "").trim(),
      address: (document.getElementById("address").value || "").trim(),
      phone: (document.getElementById("phone").value || "").trim()
    };
  }

  function validatePayload(p) {
    if (!p.full_name) return "Nama wajib diisi.";
    if (!p.birth_place) return "Tempat lahir wajib diisi.";
    if (!p.birth_date) return "Tanggal lahir wajib diisi.";
    if (!p.gender) return "Jenis kelamin wajib diisi.";
    if (!p.address) return "Alamat wajib diisi.";
    if (!p.phone) return "No HP wajib diisi.";

    if (p.phone && p.phone.replace(/\D/g, "").length < 8) {
      return "No HP tidak valid (minimal 8 digit).";
    }

    if (p.gender && !["M", "F"].includes(p.gender)) {
      return "Jenis kelamin tidak valid.";
    }

    if (p.nik) {
      if (!/^\d+$/.test(p.nik)) return "NIK harus berupa angka.";
      if (p.nik.length !== 16) return "NIK wajib 16 digit.";
    }

    return null;
  }

  function openAdd() {
    clearModalError();
    resetForm();
    modalTitle.textContent = "Tambah Pasien";
    modal.show();
  }

  async function openEdit(id) {
    try {
      clearModalError();
      resetForm();
      modalTitle.textContent = "Edit Pasien";
      modal.show();

      const r = await apiGet(`/api/patients/${id}`);

      document.getElementById("patient_id").value = r.id ?? "";
      document.getElementById("nik").value = r.nik ?? "";
      document.getElementById("full_name").value = r.full_name ?? "";
      document.getElementById("birth_place").value = r.birth_place ?? "";
      document.getElementById("birth_date").value = toISODate(r.birth_date);
      document.getElementById("gender").value = r.gender ?? "";
      document.getElementById("address").value = r.address ?? "";
      document.getElementById("phone").value = r.phone ?? "";
    } catch (e) {
      showModalError(e.message);
    }
  }

  async function savePatient() {
    try {
      clearModalError();

      const id = (document.getElementById("patient_id").value || "").trim();
      const payload = getFormPayload();

      const err = validatePayload(payload);
      if (err) {
        showModalError(err);
        return;
      }

      const btnSave = document.getElementById("btnSave");
      btnSave.disabled = true;

      try {
        if (!id) {
          await apiSend("/api/patients", "POST", payload);
        } else {
          await apiSend(`/api/patients/${encodeURIComponent(id)}`, "PUT", payload);
        }
      } finally {
        btnSave.disabled = false;
      }

      modal.hide();
      await loadPatients();
    } catch (e) {
      showModalError(e.message);
    }
  }

  document.getElementById("btnLoad").addEventListener("click", loadPatients);
  document.getElementById("btnAdd").addEventListener("click", openAdd);
  document.getElementById("btnSave").addEventListener("click", savePatient);

  qEl.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") {
      ev.preventDefault();
      loadPatients();
    }
  });

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (isMobileView()) {
        destroyDataTableIfExists();
      } else {
        initOrRefreshDataTable();
      }
    }, 200);
  });

  window.openEdit = openEdit;

  loadPatients();
</script>
{% endblock %}

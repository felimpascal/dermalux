<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Dermalux</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">

    <style>
        :root{
            --login-card-max: 420px;

            /* ===== Palette sama dengan base.html ===== */
            --dl-bg: #f7f1eb;
            --dl-bg-soft: #f3ebe3;
            --dl-surface: rgba(255,255,255,0.78);
            --dl-surface-strong: rgba(255,255,255,0.92);
            --dl-text: #5f4335;
            --dl-text-soft: #7b6657;
            --dl-line: #e6d8cb;
            --dl-gold: #c7aa87;
            --dl-green: #7d8b67;
            --dl-shadow: 0 12px 35px rgba(120, 92, 70, 0.08);
        }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            color: var(--dl-text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

            background-image: url("{{ url_for('static', filename='images/background.png') }}");
            background-color: var(--dl-bg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center top;
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 12px;
        }

        .login-card {
            width: 100%;
            max-width: var(--login-card-max);
            border: 1px solid var(--dl-line);
            border-radius: 18px;
            background: var(--dl-surface);
            box-shadow: var(--dl-shadow);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .login-card .card-body {
            padding: 1.75rem;
        }

        .login-logo {
            max-height: 220px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
        }

        .login-title {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: .2rem;
            color: var(--dl-text);
        }

        .login-subtitle {
            color: var(--dl-text-soft);
            font-size: .92rem;
            margin-bottom: 1rem;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: .4rem;
            color: var(--dl-text);
        }

        .form-control {
            min-height: 44px;
            border-radius: 12px;
            border: 1px solid var(--dl-line);
            background: rgba(255,255,255,0.96);
            color: var(--dl-text);
        }

        .form-control::placeholder {
            color: var(--dl-text-soft);
        }

        .form-control:focus {
            border-color: var(--dl-gold);
            box-shadow: 0 0 0 0.2rem rgba(199,170,135,0.18);
        }

        .btn-login {
            min-height: 46px;
            border-radius: 12px;
            font-weight: 600;
            background-color: var(--dl-green);
            border-color: var(--dl-green);
        }

        .btn-login:hover,
        .btn-login:focus,
        .btn-login:active {
            background-color: #6f7d5d !important;
            border-color: #6f7d5d !important;
        }

        .swal2-popup {
            border-radius: 20px !important;
        }

        .swal2-confirm {
            background-color: var(--dl-green) !important;
        }

        @media (max-width: 767.98px) {
            body {
                background-attachment: scroll;
                background-size: cover;
            }

            .login-wrapper {
                align-items: center;
                padding: 16px 10px;
            }

            .login-card {
                max-width: 100%;
                border-radius: 16px;
            }

            .login-card .card-body {
                padding: 1.2rem;
            }

            .login-logo {
                max-height: 150px;
            }

            .login-title {
                font-size: 1.1rem;
            }

            .login-subtitle {
                font-size: .88rem;
            }

            .form-control,
            .btn-login {
                font-size: .95rem;
            }
        }

        @media (min-width: 768px) and (max-width: 1199.98px) {
            .login-logo {
                max-height: 180px;
            }
        }
    </style>
</head>
<body>

<div class="container login-wrapper">
    <div class="card login-card">
        <div class="card-body">

            <div class="text-center mb-3">
                <img src="{{ url_for('static', filename='images/logo.png') }}"
                     alt="Dermalux Clinic"
                     class="login-logo">
            </div>

            <div class="text-center mb-4">
                <div class="login-title">Login Dermalux</div>
                <div class="login-subtitle">Masuk ke sistem klinik</div>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text"
                           name="txtUser"
                           class="form-control"
                           autocomplete="username"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password"
                           name="txtPassword"
                           class="form-control"
                           autocomplete="current-password"
                           required>
                </div>

                <button class="btn btn-primary w-100 btn-login" type="submit">
                    Login
                </button>
            </form>

        </div>
    </div>
</div>

<script>
{% with messages = get_flashed_messages() %}
{% if messages %}
Swal.fire({
    icon: 'info',
    title: 'Informasi',
    text: {{ messages[0] | tojson }},
    confirmButtonColor: '#7d8b67'
});
{% endif %}
{% endwith %}
</script>

</body>
</html>
